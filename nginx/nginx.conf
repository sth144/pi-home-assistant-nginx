events {}

http {
  server_names_hash_bucket_size 128;
  client_max_body_size 100M;
  resolver 1.1.1.1;

  # -----------------------------
  # GLOBAL REVERSE PROXY SETTINGS
  # -----------------------------
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  # -----------------------------
  # INTERNAL LAN SERVICES (port 80)
  # -----------------------------

  server {
    listen 80;
    server_name homer;
    location / { proxy_pass http://192.168.1.243:8092; }
  }

  server {
    listen 80;
    server_name home.assistant;
    location / { proxy_pass http://192.168.1.243:8123; }
  }

  server {
    listen 80;
    server_name grafana;
    location / { proxy_pass http://192.168.1.245:3000; }
  }

  server {
    listen 80;
    server_name prometheus;
    location / { proxy_pass http://192.168.1.245:9090; }
  }

  server {
    listen 80;
    server_name portainer;
    location / { proxy_pass http://192.168.1.243:9000; }
  }

  server {
    listen 80;
    server_name wireguard;
    location / { proxy_pass http://192.168.1.243:51821; }
  }

  server {
    listen 80;
    server_name heimdall;
    location / { proxy_pass http://192.168.1.243:780; }
  }

  # -----------------------------------------
  # ACME endpoint for Let's Encrypt challenge
  # -----------------------------------------
  server {
    listen 80;
    listen [::]:80;
    server_name sth144.duckdns.org *.sth144.duckdns.org;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # redirect all normal HTTP to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # -----------------------------------------
  # HTTPS PROXY BLOCKS (ONE PER SUBDOMAIN)
  # -----------------------------------------

  # HASS
  server {
    listen 443 ssl;
    server_name hass.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
      proxy_pass http://192.168.1.243:8123;
    }
  }

  # PLEX
  server {
    listen 443 ssl;
    server_name plex.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:32400; }
  }

  # AUDIOBOOKSHELF
  server {
    listen 443 ssl;
    server_name audiobookshelf.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:13378; }
  }

  # NEXTCLOUD
  server {
    listen 443 ssl;
    server_name nextcloud.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:9080; }
  }

  # NAS
  server {
    listen 443 ssl;
    server_name nas.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:81; }
  }

  # PORTAINER
  server {
    listen 443 ssl;
    server_name portainer.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.243:9000; }
  }

  # PICOLUSTER
  server {
    listen 443 ssl;
    server_name picocluster.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass https://pc0; }
  }

  # GITLAB
  server {
    listen 443 ssl;
    server_name gitlab.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:11080; }
  }

  # JOPLIN
  server {
    listen 443 ssl;
    server_name joplin.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:22300; }
  }

  # OPEN-WEBUI
  server {
    listen 443 ssl;
    server_name open-webui.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:3001; }
  }

  # CALIBRE
  server {
    listen 443 ssl;
    server_name calibre.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:8083; }
  }

  # KAVITA
  server {
    listen 443 ssl;
    server_name kavita.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { proxy_pass http://192.168.1.245:8181; }
  }

  # FREECAD (Protected)
  server {
    listen 443 ssl;
    server_name freecad.sth144.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/sth144.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sth144.duckdns.org/privkey.pem;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    auth_basic "Restricted Area";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / { proxy_pass http://192.168.1.235:4000; }
  }

}

