              - type: picture-entity
                entity: camera.chihuahueno_cam
                name: Chihuahueño
                camera_view: auto
                aspect_ratio: 16x9
              - type: picture-entity
                entity: camera.wyze_v3_bear_cam
                name: Bear
                camera_view: auto
                aspect_ratio: 16x9
          - type: custom:floorplan-card
            config:
              image: /local/floorplan/house-3d.svg
              stylesheet: /local/floorplan/house-3d.css
              rules:
                - entity: light.living_room
                  element: room_living
                  tap_action:
                    action: toggle
                  state_action:
                    action: call-service
                    service: floorplan.class_set
                    service_data:
                      class: light-${entity.state}
            card_mod:
              style: |
                ha-card {
                  width: 100%;
                  max-width: 300px !important;
                  margin: 0 auto;
                  overflow: hidden;
                }
