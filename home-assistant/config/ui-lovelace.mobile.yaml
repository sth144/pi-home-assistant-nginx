            name: Garage
            camera_view: auto
            aspect_ratio: 16x9
          - type: picture-entity
            entity: camera.wyze_v3
            name: Living Room
            camera_view: auto
            aspect_ratio: 16x9
          - type: picture-entity
            entity: camera.wyze_v4_driveway_cam_1
            name: Driveway
            camera_view: auto
            aspect_ratio: 16x9
          - type: vertical-stack
