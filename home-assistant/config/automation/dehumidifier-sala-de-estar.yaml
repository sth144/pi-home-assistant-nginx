  mode: single

- id: midea_sala_de_estar_tank_full_alert
  alias: "Midea Sala de estar: tank full alert"
  description: "Raise a persistent alert when bucket is full."
  trigger:
    - platform: state
      entity_id: binary_sensor.sala_de_estar_tank_full
      to: "on"
      for: "00:02:00"
  action:
    - service: persistent_notification.create
      data:
        title: "Dehumidifier bucket is full"
        message: "Sala de estar dehumidifier tank is full. Empty bucket to resume operation."
        notification_id: midea_sala_de_estar_tank_full
    - service: notify.mobile_app_sean_hinds
      continue_on_error: true
      data:
        title: "Dehumidifier bucket is full"
        message: "Sala de estar dehumidifier tank is full. Empty bucket to resume operation."
  mode: single

- id: midea_sala_de_estar_tank_full_cleared
  alias: "Midea Sala de estar: clear tank full alert"
  description: "Dismiss the full-bucket alert when condition clears."
  trigger:
    - platform: state
      entity_id: binary_sensor.sala_de_estar_tank_full
      to: "off"
      for: "00:02:00"
  action:
    - service: persistent_notification.dismiss
      data:
        notification_id: midea_sala_de_estar_tank_full
  mode: single

- id: midea_sala_de_estar_unavailable_alert
  alias: "Midea Sala de estar: unavailable alert"
  description: "Alert if integration/device goes unavailable for an extended period."
  trigger:
    - platform: state
      entity_id: humidifier.sala_de_estar
      to: "unavailable"
      for: "00:10:00"
  action:
    - service: persistent_notification.create
      data:
        title: "Dehumidifier unavailable"
        message: "humidifier.sala_de_estar has been unavailable for over 10 minutes. Check device power, Wi-Fi, and integration health."
        notification_id: midea_sala_de_estar_unavailable
    - service: notify.mobile_app_sean_hinds
      continue_on_error: true
      data:
        title: "Dehumidifier unavailable"
        message: "humidifier.sala_de_estar has been unavailable for over 10 minutes. Check device power, Wi-Fi, and integration health."
  mode: single
