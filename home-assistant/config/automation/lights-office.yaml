- id: "1632251772271"
  alias: button0-toggle-office-lights
  description: ""
  trigger:
    - platform: event
      event_type: zha_event
      event_data:
        device_id: 9207a1c4c264befd7e62c32fee0e3155
        device_ieee: 00:15:8d:00:07:9b:7f:1f
        unique_id: 00:15:8d:00:07:9b:7f:1f:1:0x0006
        endpoint_id: 1
        cluster_id: 6
        command: click
        args:
          click_type: single
        params: {}
  condition: []
  action:
    - service: switch.toggle
      target:
        entity_id: switch.sonoff_smart_plug_4
    - service: switch.toggle
      target:
        entity_id: switch.office_string_lights
  mode: single
- id: "1670545620753"
  alias: Tag Toggle Office Light is scanned
  description: ""
  trigger:
    - platform: tag
      tag_id: 2b55a522-e72d-49a5-8e86-0bd7a26bfa36
  condition: []
  action:
    - service: switch.toggle
      target:
        entity_id: switch.sonoff_smart_plug_4
  mode: single
- id: "1678768493430"
  alias: turn-off-office-lights-late-night
  description: ""
  trigger:
    - platform: sun
      event: sunset
      offset: "5:00"
  condition: []
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.office_string_lights
    - service: switch.turn_off
      target:
        entity_id: switch.sonoff_smart_plug_4
  mode: single
- id: "1747987200000"
  alias: keep-office-lamp-synced-with-string-lights
  description: Keep Sonoff Smart Plug 4 synced with office string lights.
  trigger:
    - platform: time_pattern
      minutes: "/2"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: switch.office_string_lights
              state: "on"
            - condition: state
              entity_id: switch.sonoff_smart_plug_4
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.sonoff_smart_plug_4
        - conditions:
            - condition: state
              entity_id: switch.office_string_lights
              state: "off"
            - condition: state
              entity_id: switch.sonoff_smart_plug_4
              state: "on"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.sonoff_smart_plug_4
  mode: single
