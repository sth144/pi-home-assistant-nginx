- description: "switch-toggle-backyard-hose"
  id: "1638738317412"
  mode: single
  trigger:
    - platform: event
      event_type: zha_event
      event_data:
        device_id: 5ce89c45457b99a84eb2896c8d595f45
        endpoint_id: 2
        cluster_id: 6
        command: remote_button_short_press
        args: []
        params: {}
  condition: []
  action:
    - service: switch.toggle
      target:
        entity_id: switch.backyard_hose_timer_sonnof
  alias: Toggle Backyard Hose

- id: backyard_hose_timer_run_at_sunset
  alias: Backyard Hose Timer At Sunset
  description: Run the backyard hose timer for one hour at sunset and notify Sean when it starts and stops.
  mode: single
  trigger:
    - platform: sun
      event: sunset
  condition: []
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.backyard_hose_timer_sonnof
    - service: notify.mobile_app_sean_hindss_iphone
      continue_on_error: true
      data:
        title: Backyard Hose Timer
        message: Backyard hose timer started at sunset and will run for 1 hour.
    - delay: "01:00:00"
    - service: switch.turn_off
      target:
        entity_id: switch.backyard_hose_timer_sonnof
    - service: notify.mobile_app_sean_hindss_iphone
      continue_on_error: true
      data:
        title: Backyard Hose Timer
        message: Backyard hose timer stopped after 1 hour.

- id: backyard_hose_timer_failsafe_off
  alias: Backyard Hose Timer Failsafe Off
  description: Turn off the backyard hose timer if it has been left on for more than 2 hours.
  mode: single
  trigger:
    - platform: state
      entity_id: switch.backyard_hose_timer_sonnof
      to: "on"
      for: "02:00:00"
    - platform: time_pattern
      minutes: "/15"
  condition:
    - condition: state
      entity_id: switch.backyard_hose_timer_sonnof
      state: "on"
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(states.switch.backyard_hose_timer_sonnof.last_changed)) > 7200 }}
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.backyard_hose_timer_sonnof
    - service: notify.mobile_app_sean_hindss_iphone
      continue_on_error: true
      data:
        title: Backyard Hose Timer Failsafe
        message: Backyard hose timer was turned off after running for over 2 hours.
