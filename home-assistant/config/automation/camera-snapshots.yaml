- id: front_door_snapshot_cache_refresh
  alias: Refresh front door snapshot cache
  description: Cache the latest front door still image for Lovelace fallback.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: template
      value_template: "{{ states('camera.front_door_mqtt') not in ['unavailable', 'unknown'] }}"
  action:
    - service: camera.snapshot
      target:
        entity_id: camera.front_door_mqtt
      data:
        filename: /config/www/tmp/front_door_snapshot.jpg
    - service: shell_command.promote_camera_snapshot
      data:
        temp_path: /config/www/tmp/front_door_snapshot.jpg
        final_path: /config/www/front_door_snapshot.jpg

