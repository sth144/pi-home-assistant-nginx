nest:
  client_id: !secret nest_client_id
  client_secret: !secret nest_client_secret
  # "Project ID" in the Device Access Console
  project_id: !secret nest_project_id
  # Provide the full path exactly as shown under "Subscription name" in Google Cloud Console
  subscriber_id: !secret nest_subscriber_id

camera:
  - platform: ffmpeg
    name: wyze_v3
    #input: rtsp://192.168.1.63:8554/video1
    input: !secret wb_rtsp_url_living_room_cam
  - platform: ffmpeg
    name: wyze_v3_garage_cam
    input: !secret wb_rtsp_url_garage_cam
  - platform: ffmpeg
    name: wyze_v4_driveway_cam_1
    input: rtsp://192.168.1.243:4550/686569ac8d69d5f8
    # input: rtsp://192.168.1.243:8554/driveway-cam
    extra_arguments: -rtsp_transport tcp -stimeout 5000000 -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 10
  #- platform: generic
  #  name: wyze_v3_driveway_cam
  #  stream_source: rtsp://192.168.1.243:8554/driveway-cam
  #  still_image_url: /local/obama.jpg
  - platform: ffmpeg
    name: camera.front_door_1
    input: rtsp://192.168.1.243:8555
  - platform: ffmpeg
    name: wyze_og_bear_cam
    input: !secret wb_rtsp_url_bear_cam


sensor:
  - platform: google_wifi
    name: "Google WiFi"
    host: 192.168.1.1
  - platform: template
    sensors:
      outdoor_temperature_f:
        friendly_name: "Outdoor Temperature F"
        unit_of_measurement: "°F"
        value_template: "{{ state_attr('weather.home', 'temperature') }}"
  - platform: integration
    source: sensor.backyard_hose_timer_sonnof_volume_flow_rate
    name: "Backyard Hose Water Total"
    unit_time: h
    method: trapezoidal
    round: 3
  - platform: statistics
    name: "Backyard Hose Water Last 7 Days"
    entity_id: sensor.backyard_hose_water_total
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000
    precision: 3

