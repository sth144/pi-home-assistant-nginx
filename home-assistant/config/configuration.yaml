# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

homeassistant:
  external_url: "https://hass.sth144.duckdns.org"
  internal_url: "http://192.168.1.243:8123"
  allowlist_external_dirs:
    - /config/www

lovelace:
  resource_mode: storage
  dashboards:
    ui-system:
      mode: yaml
      title: System
      filename: ui-system.yaml
      icon: mdi:server
      show_in_sidebar: true
    ui-mobile: # Needs to contain a hyphen (-)
      mode: yaml
      filename: ui-lovelace.mobile.yaml
      title: Mobile
      icon: mdi:cellphone
      show_in_sidebar: true
      require_admin: true
    ui-overview:
      mode: yaml
      title: Overview
      filename: ui-overview.yaml
      icon: mdi:view-dashboard
      show_in_sidebar: true

# Text to speech
tts:
  - platform: google_translate

shell_command:
  promote_camera_snapshot: "bash /config/bin/promote_camera_snapshot.sh {{ temp_path }} {{ final_path }}"

group: !include groups.yaml
automation: !include_dir_merge_list automation/
script: !include scripts.yaml
scene: !include scenes.yaml
input_number:
  midea_sala_de_estar_on_humidity:
    name: Midea Sala de estar on humidity
    min: 45
    max: 75
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 58
  midea_sala_de_estar_off_humidity:
    name: Midea Sala de estar off humidity
    min: 35
    max: 70
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 50
  midea_sala_de_estar_target_humidity:
    name: Midea Sala de estar target humidity
    min: 35
    max: 60
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 50

input_datetime:
  midea_sala_de_estar_quiet_start:
    name: Midea Sala de estar quiet start
    has_date: false
    has_time: true
    initial: "22:30"
  midea_sala_de_estar_quiet_end:
    name: Midea Sala de estar quiet end
    has_date: false
    has_time: true
    initial: "07:30"

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 192.168.1.243
    - 192.168.240.0/24
    - 172.16.0.0/12
    - 172.17.0.0/16
    - 172.18.0.0/16
    - 172.19.0.0/16
    - 172.20.0.0/16
    - 172.21.0.0/16
    - 172.22.0.0/16
    - 172.23.0.0/16
    - 172.24.0.0/16
    - 172.25.0.0/16
    - 172.26.0.0/16
    - 172.27.0.0/16
    - 172.28.0.0/16
    - 172.29.0.0/16
    - 172.30.0.0/16
    - 172.31.0.0/16

bluetooth:

# ecovacs:
#   username: !secret email
#   password: !secret deebot_password
#   country: us
#   continent: na

# pi_hole:
#   - host: !secret pihole_host

nest:
  client_id: !secret nest_client_id
  client_secret: !secret nest_client_secret
  # "Project ID" in the Device Access Console
  project_id: !secret nest_project_id
  # Provide the full path exactly as shown under "Subscription name" in Google Cloud Console
  subscriber_id: !secret nest_subscriber_id

camera:
  - platform: ffmpeg
    name: wyze_v3
    # Previous stream:
    # input: !secret wb_rtsp_url_living_room_cam
    input: -rtsp_transport tcp -i !secret wb_rtsp_url_living_room_cam_rtsp
  - platform: ffmpeg
    name: wyze_v3_garage_cam
    input: !secret wb_rtsp_url_garage_cam
  - platform: ffmpeg
    name: wyze_v4_driveway_cam_1
    input: !secret wb_rtsp_url_driveway_cam
    extra_arguments: -rtsp_transport tcp -stimeout 5000000 -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 10
  - platform: ffmpeg
    name: camera.front_door_1
    input: rtsp://192.168.1.243:8555
  - platform: ffmpeg
    name: wyze_og_bear_cam
    input: !secret wb_rtsp_url_bear_cam

sensor:
  - platform: google_wifi
    name: "Google WiFi"
    host: 192.168.1.1
  - platform: template
    sensors:
      outdoor_temperature_f:
        friendly_name: "Outdoor Temperature F"
        unit_of_measurement: "°F"
        value_template: "{{ state_attr('weather.home', 'temperature') }}"
  - platform: integration
    source: sensor.backyard_hose_timer_sonnof_volume_flow_rate
    name: "Backyard Hose Water Total"
    unit_time: h
    method: trapezoidal
    round: 3
  - platform: integration
    source: sensor.frontyard_hose_timer_sonoff_volume_flow_rate
    name: "Frontyard Hose Water Total"
    unit_time: h
    method: trapezoidal
    round: 3
  - platform: statistics
    name: "Backyard Hose Water Last 7 Days"
    entity_id: sensor.backyard_hose_water_total
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000
    precision: 3
  - platform: statistics
    name: "Frontyard Hose Water Last 7 Days"
    entity_id: sensor.frontyard_hose_water_total
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000
    precision: 3

binary_sensor:
  - platform: command_line
    name: Front Door Snapshot Available
    unique_id: front_door_snapshot_available
    command: test -s /config/www/front_door_snapshot.jpg && echo ON || echo OFF
    payload_on: 'ON'
    payload_off: 'OFF'
    scan_interval: 60
  - platform: command_line
    name: Garage Snapshot Available
    unique_id: garage_snapshot_available
    command: test -s /config/www/garage_cam_snapshot.jpg && echo ON || echo OFF
    payload_on: 'ON'
    payload_off: 'OFF'
    scan_interval: 60
  - platform: command_line
    name: Living Room Snapshot Available
    unique_id: living_room_snapshot_available
    command: test -s /config/www/living_room_snapshot.jpg && echo ON || echo OFF
    payload_on: 'ON'
    payload_off: 'OFF'
    scan_interval: 60
  - platform: command_line
    name: Driveway Snapshot Available
    unique_id: driveway_snapshot_available
    command: test -s /config/www/driveway_cam_snapshot.jpg && echo ON || echo OFF
    payload_on: 'ON'
    payload_off: 'OFF'
    scan_interval: 60

device_tracker:
  - platform: netgear
    host: 192.168.1.2
    port: 80
    username: !secret netgear_username
    password: !secret netgear_password
    accesspoints:
      - netgear
