version: "2.1"
services:
  heimdall:
    image: ghcr.io/linuxserver/heimdall
    container_name: heimdall
    logging:
      options:
        max-size: 10m
        max-file: "3"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/pi/Volumes/heimdall:/config
    ports:
      - 780:80
      - 7443:443
      - 10000:9000
    restart: unless-stopped
